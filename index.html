<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Tic Tac Toe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">Elegant Tic Tac Toe</h1>
            <p class="game-subtitle">The classic game with a modern twist</p>
        </div>

        <div class="game-panel">
            <div class="left-panel">
                <div class="score-board">
                    <h2 class="score-title">Score Board</h2>
                    <div class="score-container">
                        <div class="score-player player-x">
                            <div class="player-name">Player X</div>
                            <div class="player-score" id="score-x">0</div>
                        </div>
                        <div class="score-divider">:</div>
                        <div class="score-player player-o">
                            <div class="player-name">Player O</div>
                            <div class="player-score" id="score-o">0</div>
                        </div>
                    </div>
                </div>

                <div class="game-controls">
                    <h2 class="controls-title">Game Controls</h2>
                    <div class="controls-buttons">
                        <div class="game-mode-selector">
                            <div class="mode-option active" data-mode="two-player">Two Players</div>
                            <div class="mode-option" data-mode="vs-computer">vs Computer</div>
                        </div>

                        <div class="difficulty-selector" id="difficulty-selector">
                            <div class="difficulty-title">Computer Difficulty</div>
                            <div class="difficulty-options">
                                <div class="difficulty-option active" data-difficulty="easy">Easy</div>
                                <div class="difficulty-option" data-difficulty="medium">Medium</div>
                                <div class="difficulty-option" data-difficulty="hard">Hard</div>
                            </div>
                        </div>

                        <button class="control-btn new-game-btn" id="new-game-btn">
                            <i class="fas fa-plus-circle"></i> New Game
                        </button>
                        <button class="control-btn reset-btn" id="reset-btn">
                            <i class="fas fa-redo"></i> Reset Score
                        </button>
                        <button class="control-btn mode-btn" id="switch-side-btn">
                            <i class="fas fa-random"></i> Switch Side (X/O)
                        </button>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="game-board" id="game-board">
                    <!-- Cells will be generated by JavaScript -->
                </div>

                <div class="game-info">
                    <div class="current-player">
                        Current Player:
                        <span id="current-player-indicator">X</span>
                    </div>
                    <div class="player-turn-indicator">
                        <div class="turn-icon x">X</div>
                        <span>Turn</span>
                        <div class="turn-icon o">O</div>
                    </div>
                    <div class="game-status" id="game-status">Make your move!</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Made with <i class="fas fa-heart" style="color:#e74c3c;"></i> | Tic Tac Toe</p>
        </div>
    </div>

    <!-- Game Result Modal -->
    <div class="modal" id="result-modal">
        <div class="modal-content">
            <h2 class="modal-title">Game Over!</h2>
            <div class="modal-message" id="modal-message"></div>
            <div class="modal-winner" id="modal-winner"></div>
            <button class="modal-btn" id="play-again-btn">Play Again</button>
        </div>
    </div>

    <script>
        // Game state variables
        let currentPlayer = 'X';
        let gameBoard = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        let scores = { X: 0, O: 0, ties: 0 };
        let gameMode = 'two-player'; // 'two-player' or 'vs-computer'
        let playerSide = 'X'; // Which side the player is playing as in vs computer mode
        let computerDifficulty = 'medium'; // 'easy', 'medium', 'hard'

        // Winning combinations
        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
            [0, 4, 8], [2, 4, 6] // diagonals
        ];

        // DOM elements
        const gameBoardElement = document.getElementById('game-board');
        const currentPlayerIndicator = document.getElementById('current-player-indicator');
        const gameStatusElement = document.getElementById('game-status');
        const scoreXElement = document.getElementById('score-x');
        const scoreOElement = document.getElementById('score-o');
        const newGameBtn = document.getElementById('new-game-btn');
        const resetBtn = document.getElementById('reset-btn');
        const switchSideBtn = document.getElementById('switch-side-btn');
        const resultModal = document.getElementById('result-modal');
        const modalMessage = document.getElementById('modal-message');
        const modalWinner = document.getElementById('modal-winner');
        const playAgainBtn = document.getElementById('play-again-btn');
        const difficultySelector = document.getElementById('difficulty-selector');

        // Initialize the game board
        function initializeBoard() {
            gameBoardElement.innerHTML = '';

            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.setAttribute('data-index', i);
                cell.addEventListener('click', () => cellClicked(i));
                gameBoardElement.appendChild(cell);
            }

            updateGameStatus();
        }

        // Handle cell click
        function cellClicked(index) {
            // Check if cell is empty and game is active
            if (gameBoard[index] !== '' || !gameActive) {
                return;
            }

            // Make the move
            makeMove(index, currentPlayer);

            // Check for win or draw
            const winInfo = checkWin();
            if (winInfo) {
                // Handle win
                handleWin(winInfo.winner, winInfo.winningCombo);
                return;
            }

            // Check for draw
            if (checkDraw()) {
                handleDraw();
                return;
            }

            // Switch player
            switchPlayer();

            // If playing against computer and it's computer's turn
            if (gameMode === 'vs-computer' && currentPlayer !== playerSide && gameActive) {
                setTimeout(makeComputerMove, 500);
            }
        }

        // Make a move on the board
        function makeMove(index, player) {
            gameBoard[index] = player;
            const cell = document.querySelector(`.cell[data-index="${index}"]`);
            cell.textContent = player;
            cell.classList.add(player.toLowerCase());

            // Add animation
            cell.style.animation = 'none';
            setTimeout(() => {
                cell.style.animation = 'markAppear 0.3s ease-out';
            }, 10);
        }

        // Switch the current player
        function switchPlayer() {
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            updateGameStatus();
        }

        // Update game status display
        function updateGameStatus() {
            currentPlayerIndicator.textContent = currentPlayer;
            currentPlayerIndicator.className = currentPlayer === 'X' ? 'x' : 'o';

            if (gameActive) {
                if (gameMode === 'vs-computer' && currentPlayer !== playerSide) {
                    gameStatusElement.textContent = "Computer's turn...";
                } else {
                    gameStatusElement.textContent = `Player ${currentPlayer}'s turn`;
                }
                gameStatusElement.style.color = currentPlayer === 'X' ? '#667eea' : '#764ba2';
            }
        }

        // Check for a win
        function checkWin() {
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (
                    gameBoard[a] &&
                    gameBoard[a] === gameBoard[b] &&
                    gameBoard[a] === gameBoard[c]
                ) {
                    return {
                        winner: gameBoard[a],
                        winningCombo: [a, b, c]
                    };
                }
            }
            return null;
        }

        // Check for a draw
        function checkDraw() {
            return gameBoard.every(cell => cell !== '');
        }

        // Handle win
        function handleWin(winner, winningCombo) {
            gameActive = false;

            // Update score
            scores[winner]++;
            updateScoreboard();

            // Highlight winning cells
            winningCombo.forEach(index => {
                const cell = document.querySelector(`.cell[data-index="${index}"]`);
                cell.classList.add('winning-cell');
            });

            // Show win message
            gameStatusElement.textContent = `Player ${winner} wins!`;
            gameStatusElement.style.color = winner === 'X' ? '#667eea' : '#764ba2';

            // Show modal
            setTimeout(() => {
                modalMessage.textContent = `Player ${winner} wins the game!`;
                modalWinner.textContent = winner;
                modalWinner.className = `modal-winner ${winner.toLowerCase()}`;
                resultModal.style.display = 'flex';
            }, 800);
        }

        // Handle draw
        function handleDraw() {
            gameActive = false;
            scores.ties++;
            updateScoreboard();

            gameStatusElement.textContent = "It's a draw!";
            gameStatusElement.style.color = '#666';

            // Show modal
            setTimeout(() => {
                modalMessage.textContent = "The game ended in a draw!";
                modalWinner.textContent = "🤝";
                modalWinner.className = "modal-winner";
                resultModal.style.display = 'flex';
            }, 800);
        }

        // Update scoreboard
        function updateScoreboard() {
            scoreXElement.textContent = scores.X;
            scoreOElement.textContent = scores.O;

            // Save scores to localStorage
            localStorage.setItem('ticTacToeScores', JSON.stringify(scores));
        }

        // Load scores from localStorage
        function loadScores() {
            const savedScores = localStorage.getItem('ticTacToeScores');
            if (savedScores) {
                scores = JSON.parse(savedScores);
                updateScoreboard();
            }
        }

        // Reset the game board
        function resetGameBoard() {
            gameBoard = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            currentPlayer = 'X';

            // Clear all cells
            document.querySelectorAll('.cell').forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('x', 'o', 'winning-cell');
            });

            updateGameStatus();
        }

        // Make computer move based on difficulty
        function makeComputerMove() {
            if (!gameActive) return;

            let availableCells = [];
            gameBoard.forEach((cell, index) => {
                if (cell === '') availableCells.push(index);
            });

            if (availableCells.length === 0) return;

            let computerMove;

            switch (computerDifficulty) {
                case 'easy':
                    // Random move
                    computerMove = availableCells[Math.floor(Math.random() * availableCells.length)];
                    break;

                case 'medium':
                    // Sometimes smart, sometimes random (50/50)
                    if (Math.random() > 0.5) {
                        computerMove = getBestMove();
                    } else {
                        computerMove = availableCells[Math.floor(Math.random() * availableCells.length)];
                    }
                    break;

                case 'hard':
                    // Always the best move
                    computerMove = getBestMove();
                    break;

                default:
                    computerMove = availableCells[Math.floor(Math.random() * availableCells.length)];
            }

            makeMove(computerMove, currentPlayer);

            // Check for win or draw
            const winInfo = checkWin();
            if (winInfo) {
                handleWin(winInfo.winner, winInfo.winningCombo);
                return;
            }

            // Check for draw
            if (checkDraw()) {
                handleDraw();
                return;
            }

            // Switch back to player
            switchPlayer();
        }

        // Get the best move for the computer (minimax algorithm simplified)
        function getBestMove() {
            // First, check if computer can win in the next move
            for (let i = 0; i < 9; i++) {
                if (gameBoard[i] === '') {
                    gameBoard[i] = currentPlayer;
                    if (checkWin()) {
                        gameBoard[i] = '';
                        return i;
                    }
                    gameBoard[i] = '';
                }
            }

            // Check if player can win in the next move and block them
            const opponent = currentPlayer === 'X' ? 'O' : 'X';
            for (let i = 0; i < 9; i++) {
                if (gameBoard[i] === '') {
                    gameBoard[i] = opponent;
                    if (checkWin()) {
                        gameBoard[i] = '';
                        return i;
                    }
                    gameBoard[i] = '';
                }
            }

            // Try to take the center if available
            if (gameBoard[4] === '') return 4;

            // Try to take a corner
            const corners = [0, 2, 6, 8];
            const availableCorners = corners.filter(index => gameBoard[index] === '');
            if (availableCorners.length > 0) {
                return availableCorners[Math.floor(Math.random() * availableCorners.length)];
            }

            // Take any available edge
            const edges = [1, 3, 5, 7];
            const availableEdges = edges.filter(index => gameBoard[index] === '');
            if (availableEdges.length > 0) {
                return availableEdges[Math.floor(Math.random() * availableEdges.length)];
            }

            // Fallback to random move (should never reach here)
            const availableCells = [];
            gameBoard.forEach((cell, index) => {
                if (cell === '') availableCells.push(index);
            });
            return availableCells[Math.floor(Math.random() * availableCells.length)];
        }

        // Switch player side in vs computer mode
        function switchPlayerSide() {
            if (gameMode !== 'vs-computer') return;

            playerSide = playerSide === 'X' ? 'O' : 'X';

            // Update button text
            switchSideBtn.innerHTML = `<i class="fas fa-random"></i> Switch Side (${playerSide === 'X' ? 'O' : 'X'}/${playerSide})`;

            // If it's computer's turn after switching, make a move
            if (gameActive && currentPlayer !== playerSide) {
                setTimeout(makeComputerMove, 500);
            }

            updateGameStatus();
        }

        // Event Listeners
        newGameBtn.addEventListener('click', resetGameBoard);

        resetBtn.addEventListener('click', () => {
            scores = { X: 0, O: 0, ties: 0 };
            updateScoreboard();
            resetGameBoard();
        });

        switchSideBtn.addEventListener('click', switchPlayerSide);

        playAgainBtn.addEventListener('click', () => {
            resultModal.style.display = 'none';
            resetGameBoard();
        });

        // Game mode selection
        document.querySelectorAll('.mode-option').forEach(option => {
            option.addEventListener('click', () => {
                // Update active mode
                document.querySelectorAll('.mode-option').forEach(opt => opt.classList.remove('active'));
                option.classList.add('active');

                // Set game mode
                gameMode = option.getAttribute('data-mode');

                // Show/hide difficulty selector
                if (gameMode === 'vs-computer') {
                    difficultySelector.style.display = 'block';
                    switchSideBtn.style.display = 'flex';
                } else {
                    difficultySelector.style.display = 'none';
                    switchSideBtn.style.display = 'none';
                }

                // Reset game for new mode
                resetGameBoard();
            });
        });

        // Difficulty selection
        document.querySelectorAll('.difficulty-option').forEach(option => {
            option.addEventListener('click', () => {
                // Update active difficulty
                document.querySelectorAll('.difficulty-option').forEach(opt => opt.classList.remove('active'));
                option.classList.add('active');

                // Set difficulty
                computerDifficulty = option.getAttribute('data-difficulty');

                // Reset game for new difficulty
                resetGameBoard();
            });
        });

        // Initialize the game
        function initializeGame() {
            initializeBoard();
            loadScores();
            updateGameStatus();
        }

        // Start the game
        initializeGame();
    </script>
</body>

</html>
